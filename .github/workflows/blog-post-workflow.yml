name: Latest blog post workflow
on:
  workflow_dispatch:
  schedule:
    - cron: 0 0 * * 0

permissions: read-all

jobs:
  update-readme-with-blog:
    name: Update this repo's README with latest blog posts
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Pull in posts
        uses: gautamkrishnar/blog-post-workflow@2786e54a01b71aec80a5118c2bd6b5044e842597 # 1.9.6
        with:
          skip_commit: true
          feed_list: "https://ruzickap.github.io/feed.xml"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: "docs: update the latest blog posts"
          title: "docs: update the latest blog posts"
          body: "This PR updates the README to include the latest blog posts."
          branch: "chore/update-readme-with-blog-${{ github.sha }}"
          labels: "blog post"
          reviewers: ${{ github.repository_owner }}
          assignees: ${{ github.repository_owner }}
          sign-commits: true
